# CONN-0230 — Shadow prod config template for arcana-dev
# Deploy target: arcana-dev (/etc/model-connector-watcher/config.yaml, mode 0600)
# DO NOT commit a copy with real secrets. This template uses env-var references only.
#
# Shadow-mode invariants (enforced in-code by Zod superRefine):
#   recovery.circuit_reset_enabled = false  — no circuit resets
#   recovery.failover_enabled      = false  — no provider failover
#   catalog.write_enabled          = false  — catalog diff only, no writes
#   observation.bounded_canary_enabled = false  — no synthetic canary probes
#
# The watcher reads /etc/model-connector-watcher/watcher.env via systemd EnvironmentFile.
# That file (operator-provisioned, 0600) must export:
#   OPSBOT_TOKEN=<token>          — Ops Bot bearer token (required)
#   MC_API_KEY=<key>              — Model Connector API key for /connectors/catalog (required)
# WATCHER_REPAIR_TOKEN is NOT required in shadow (circuit_reset_enabled=false).

mode: shadow

model_connector:
  # Operator decision Q-1 (2026-06-22): use the public domain — arcana-dev cannot
  # reach arcana-prod MC via tailnet (100.121.155.54:3900 → HTTP 000).
  # Traefik at connector.arcanada.ai proxies to localhost:3900 on prod.
  # Authenticated endpoint (/connectors/catalog) uses the MC_API_KEY env var.
  base_url: https://connector.arcanada.ai

opsbot:
  base_url: https://ops.arcanada.ai/events
  token_env: OPSBOT_TOKEN

observation:
  interval_ms: 30000
  request_timeout_ms: 5000
  outage_consecutive_failures: 3
  bounded_canary_enabled: false       # SHADOW: must stay false
  bounded_canary_max_per_hour: 2

error_rate:
  window_ms: 300000
  minimum_samples: 20
  degrade_ratio: 0.25
  degrade_consecutive_windows: 2
  recover_ratio: 0.10
  recover_consecutive_windows: 3

latency:
  window_ms: 300000
  minimum_samples: 20
  baseline_window_ms: 86400000
  degrade_multiplier: 2.0
  degrade_absolute_delta_ms: 1000
  degrade_consecutive_windows: 3
  recover_multiplier: 1.5
  recover_consecutive_windows: 3

recovery:
  circuit_reset_enabled: false        # SHADOW: must stay false
  natural_recovery_grace_ms: 60000
  reset_cooldown_ms: 900000
  reset_budget_per_hour: 2
  reset_budget_per_day: 6
  post_reset_probe_delay_ms: 30000
  failover_enabled: false             # SHADOW: must stay false

catalog:
  fetch_enabled: true                 # read-only catalog re-fetch is ON in shadow
  write_enabled: false                # SHADOW: must stay false — alert-only, no writes
  interval_ms: 21600000              # 6 hours between re-fetches
  startup_jitter_max_ms: 600000      # up to 10 min startup jitter
  request_timeout_ms: 15000
  removal_block_ratio: 0.20
  removal_block_count: 10
  consecutive_missing_before_deprecate: 2

alerting:
  dedup_window_ms: 900000            # 15-minute dedup window
  heartbeat_interval_ms: 30000
  deadman_missed_heartbeats: 3       # alert after 3 missed heartbeats = 90s silence

storage:
  state_path: /var/lib/model-connector-watcher/state.json
  audit_path: /var/lib/model-connector-watcher/audit.jsonl

health:
  bind_host: 127.0.0.1              # loopback only — never expose publicly
  port: 3911
