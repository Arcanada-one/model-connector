services:
  model-connector:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3900:3900"
    env_file:
      - .env
    volumes:
      - claude-auth:/home/connector/.claude
      - cursor-auth:/home/connector/.cursor
      - gemini-auth:/home/connector/.config/gemini
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3900/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claude-auth:
  cursor-auth:
  gemini-auth:
