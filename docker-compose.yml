services:
  model-connector:
    build: .
    restart: unless-stopped
    ports:
      - "127.0.0.1:3900:3900"
    env_file:
      - .env
    volumes:
      - claude-auth:/home/connector/.claude
      - cursor-auth:/home/connector/.cursor
      - cursor-config:/home/connector/.config/cursor
      - gemini-auth:/home/connector/.gemini
    networks:
      - default
      # CONN-0214 — transcribator-api's compose stack is a separate project
      # (its own default bridge network); without joining it, the speech
      # proxy's TRANSCRIBATOR_API_URL default (localhost:3700, i.e. this
      # container's own loopback) can never reach it — 502 upstream_unavailable
      # on every tts/stt/vad call. Mirrors the same external-network pattern
      # arcanada-llm-proxy already uses to join model-connector_default.
      - transcribator-api
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3900/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  claude-auth:
  cursor-auth:
  cursor-config:
  gemini-auth:

networks:
  default:
  transcribator-api:
    name: transcribator-api_default
    external: true
