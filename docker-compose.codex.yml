# Codex CLI sidecar overlay — CONN-0045 Phase 1 (CONN-0063)
#
# Layered onto MC docker-compose.prod.yml on arcana-prod.
# Compose with:
#   docker compose -f docker-compose.prod.yml -f docker-compose.codex.yml up -d
#
# Tier 0 internal-only (Network Exposure Baseline) — NO `ports:` directive.
# OAuth blob delivered at runtime via Vault AppRole; never baked into image.
# T1 (blob leak): tmpfs mount on /tmpfs/codex-auth — not persisted to disk.

services:
  codex-sidecar:
    image: arcanada/codex-cli:rust-v0.130.0
    build:
      context: .
      dockerfile: Dockerfile.codex-sidecar
      args:
        CODEX_RELEASE_TAG: rust-v0.130.0
        CODEX_VERSION: "0.130.0"
    container_name: model-connector-codex-sidecar
    restart: unless-stopped
    init: true
    # Share network namespace with MC service so connector can spawn `codex` via
    # subprocess after the binary appears in the shared volume. No host ports.
    network_mode: "service:model-connector"
    environment:
      VAULT_ADDR: ${VAULT_ADDR:?VAULT_ADDR required}
      VAULT_ROLE_ID: ${CODEX_VAULT_ROLE_ID:?CODEX_VAULT_ROLE_ID required}
      VAULT_SECRET_ID: ${CODEX_VAULT_SECRET_ID:?CODEX_VAULT_SECRET_ID required}
      VAULT_KV_PATH: arcanada/prod/env/codex-cli
      CODEX_AUTH_STRATEGY: vault-blob
      CODEX_HOME: /dev/shm/codex-auth
    # CONN-0068 F-8/F-10: per-container tmpfs cannot be shared with the
    # model-connector container that actually spawns the codex binary. Bind a
    # host /dev/shm path (Linux tmpfs by default) so both containers see the
    # same OAuth blob. Sidecar gets rw, model-connector gets ro. Operator must
    # `mkdir -p /dev/shm/codex-auth && chmod 0700 /dev/shm/codex-auth` once on
    # arcana-prod before `compose up` (compose auto-creates with default mode
    # if missing, but explicit chmod 0700 is required for T-NEW mitigation).
    volumes:
      - /dev/shm/codex-auth:/dev/shm/codex-auth
      # Volume init: image pre-populates /codex-sidecar/bin/codex (see Dockerfile);
      # first mount of fresh named volume copies that into the volume so the
      # model-connector container can read the binary read-only.
      - codex-bin:/codex-sidecar/bin
    # Long-lived process; healthcheck verifies binary + auth materialisation.
    command: ["sleep", "infinity"]
    healthcheck:
      test: ["CMD-SHELL", "test -x /codex-sidecar/bin/codex && /codex-sidecar/bin/codex --version"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true

  # Augment existing `model-connector` service so it can spawn codex from the
  # shared volume. The base service is defined in docker-compose.yml; this block
  # only adds the env var, the read-only mount, and the dependency on the
  # sidecar reaching healthy state (so the binary is guaranteed present).
  model-connector:
    environment:
      CODEX_BINARY_PATH: /codex-sidecar/bin/codex
      # CONN-0068 F-10: spawned codex needs CODEX_HOME pointing at the shared
      # /dev/shm bind (sidecar wrote auth.json there). Without this env, codex
      # falls back to $HOME/.codex/auth.json (does not exist).
      CODEX_HOME: /dev/shm/codex-auth
    volumes:
      - codex-bin:/codex-sidecar/bin:ro
      # CONN-0068 F-10: read-only view of the same /dev/shm path the sidecar
      # populates. T3 mitigation: MC cannot mutate or delete the OAuth blob.
      - /dev/shm/codex-auth:/dev/shm/codex-auth:ro
    depends_on:
      codex-sidecar:
        condition: service_healthy

volumes:
  codex-bin:
    driver: local
