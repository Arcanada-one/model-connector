# connector.arcanada.one — 301 redirect to connector.arcanada.ai
# ARCA-0155 Phase 3
# NOTE: limit_req_zone kept here because connector.arcanada.ai.conf references zone=connector_api

limit_req_zone $binary_remote_addr zone=connector_api:10m rate=10r/s;

server {
    listen 80;
    server_name connector.arcanada.one;
    return 301 https://connector.arcanada.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name connector.arcanada.one;

    ssl_certificate     /etc/nginx/ssl/connector.arcanada.one.pem;
    ssl_certificate_key /etc/nginx/ssl/connector.arcanada.one.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://connector.arcanada.ai$request_uri;
}
