# connector.arcanada.ai — nginx reverse proxy vhost for Model Connector (:3900).
#
# SOURCE OF TRUTH. The live host copy is /etc/nginx/sites-available/connector.arcanada.ai.conf
# on arcana-prod (65.108.236.39). nginx is host-managed (not in the Docker deploy),
# so this file is the IaC mirror — edit HERE, then install per deploy/nginx/README.md.
#
# Rate limiting for Model Connector API.

server {
    listen 80;
    server_name connector.arcanada.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name connector.arcanada.ai;

    ssl_certificate     /etc/nginx/ssl/wildcard.arcanada.ai.pem;
    ssl_certificate_key /etc/nginx/ssl/wildcard.arcanada.ai.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # MC requests can take up to 600s (Cursor CLI timeout)
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    client_max_body_size 32m;

    location / {
        limit_req zone=connector_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    location /health {
        proxy_pass http://127.0.0.1:3900/health;
        proxy_set_header Host $host;
    }
}
