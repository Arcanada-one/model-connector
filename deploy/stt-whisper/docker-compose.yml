# Self-hosted faster-whisper-server stack for Model Connector STT Phase 2.
# Runs on arcana-ai (Tailscale 100.81.64.51). Reached by Model Connector workers
# via LOCAL_WHISPER_BASE_URL=http://arcana-ai:8400 inside the tailnet.
#
# Image pinned by digest after Phase 0 fixture capture (2026-05-16).
# Model: Systran/faster-distil-whisper-large-v3 (INT8 CT2, RTF ~1.05× on 4vCPU).
#
# x-exposure-tier: 2
# x-exposure-justification: Tailscale-only reachability. Host firewall blocks
#   eth0/wan0 to TCP 8400; docker bind is loopback (127.0.0.1:8400). Workers
#   reach the port via tailnet hostname `arcana-ai` (100.81.64.51).
services:
  whisper:
    image: fedirz/faster-whisper-server@sha256:760e5e43d427dc6cfbbc4731934b908b7de9c7e6d5309c6a1f0c8c923a5b6030
    container_name: stt-whisper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8400:8000"
    environment:
      WHISPER__MODEL: Systran/faster-distil-whisper-large-v3
      WHISPER__USE_LOCAL_FILES_ONLY: "false"
      HF_HUB_OFFLINE: "0"
    volumes:
      - whisper_hf_cache:/root/.cache/huggingface
    mem_limit: 4g
    memswap_limit: 4g
    cpus: "4.0"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  whisper_hf_cache:
