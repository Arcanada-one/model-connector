name: CI & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: [self-hosted, Linux, arcana-ai]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  docker-e2e:
    runs-on: [self-hosted, Linux, arcana-prod]
    needs: lint-and-test
    concurrency:
      group: docker-e2e-arcana-prod
      cancel-in-progress: false
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: connector_test
        ports:
          - 15432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 16379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t model-connector-e2e .

      - name: Create DB schema
        run: |
          docker run --rm --network=host \
            -e DATABASE_URL=postgresql://test:test@localhost:15432/connector_test \
            model-connector-e2e npx prisma db push

      - name: Start container
        run: |
          docker run -d --name mc-e2e --network=host \
            -e DATABASE_URL=postgresql://test:test@localhost:15432/connector_test \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=16379 \
            -e NODE_ENV=test \
            -e PORT=3900 \
            -e STT_PROVIDER_GROQ_ENABLED=false \
            model-connector-e2e
          # STT_PROVIDER_GROQ_ENABLED defaults true (env.schema), which makes the
          # boot-time env validation require STT_GROQ_API_KEY. The e2e harness does
          # not exercise STT and injects no provider key, so disable the Groq STT
          # provider here. Prod is unaffected (its .env supplies GROQ_API_KEY).

      - name: Wait for healthy
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3900/health > /dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after 60s"
          docker logs mc-e2e
          exit 1

      - name: Smoke tests
        run: |
          echo "=== GET /health ==="
          curl -fsS http://localhost:3900/health | jq .

          echo "=== GET /health/ready ==="
          curl -fsS http://localhost:3900/health/ready | jq .

          echo "=== POST /execute without auth → expect 401 ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST http://localhost:3900/execute \
            -H 'Content-Type: application/json' \
            -d '{"connector":"claude-code","prompt":"test"}')
          if [ "$STATUS" != "401" ]; then
            echo "Expected 401, got $STATUS"
            exit 1
          fi
          echo "Auth guard OK: 401"

          echo "=== GET /connectors → expect 401 ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3900/connectors)
          if [ "$STATUS" != "401" ]; then
            echo "Expected 401, got $STATUS"
            exit 1
          fi
          echo "Connectors guard OK: 401"

      - name: Cleanup
        if: always()
        run: docker rm -f mc-e2e || true

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: [self-hosted, Linux, arcana-prod]
    concurrency:
      group: deploy-model-connector
      cancel-in-progress: false
    steps:
      - name: Deploy to Arcanada PROD
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/apps/model-connector
            git pull --ff-only origin main
            # CONN-0073: layer codex overlay so codex env (CODEX_BINARY_PATH,
            # CODEX_HOME, CODEX_VAULT_ROLE_ID, CODEX_VAULT_SECRET_ID) and
            # codex-bin/dev-shm volumes are applied to model-connector container
            # alongside the codex-sidecar service.
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.codex.yml"
            # CONN-0208: cleanup orphan containers before recreate (race condition); named volumes preserved.
            $COMPOSE down --remove-orphans || true
            $COMPOSE up -d --build
            sleep 10
            curl -fsS http://localhost:3900/health || ($COMPOSE logs --tail=50 && exit 1)
            docker exec model-connector-model-connector-1 sh -c \
              'test -n "$CODEX_BINARY_PATH" && test -n "$CODEX_HOME" && test -n "$CODEX_VAULT_ROLE_ID" && test -n "$CODEX_VAULT_SECRET_ID"' \
              || (echo "FAIL CONN-0073: codex overlay env not applied"; exit 1)
            echo "Deploy successful: $($COMPOSE ps --format '{{.Name}} {{.Status}}')"
