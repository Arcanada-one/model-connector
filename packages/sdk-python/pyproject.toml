[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "arcanada-model-connector"
version = "0.1.1"
description = "Typed Python client SDK for the Arcanada Model Connector — unified API for AI CLI agents and cloud model providers."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10,<3.15"
authors = [{ name = "Arcanada", email = "ops@arcanada.ai" }]
keywords = ["model-connector", "arcanada", "llm", "output-guard", "structured-output", "ai-sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27,<1",
    "pydantic>=2.9,<3",
]

[project.urls]
Homepage = "https://github.com/Arcanada-one/model-connector"
Repository = "https://github.com/Arcanada-one/model-connector"
Issues = "https://github.com/Arcanada-one/model-connector/issues"
Documentation = "https://github.com/Arcanada-one/model-connector/blob/main/docs/sdk-python.md"
Changelog = "https://github.com/Arcanada-one/model-connector/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "respx>=0.21",
    "ruff>=0.7",
    "mypy>=1.13",
]

[tool.hatch.build.targets.wheel]
packages = ["arcanada_model_connector"]

[tool.hatch.build.targets.sdist]
include = [
    "arcanada_model_connector",
    "tests",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
